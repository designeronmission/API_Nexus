<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="images/fav.png" type="image/x-icon">
    <title>Console Authentication | APINexus Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div class="broadcast-ribbon">
        SECURE IDENTITY PROXY NODE: Restricted Infrastructure Sign-In Array
    </div>

    <main class="login-main-container">
        <div class="login-card-shield">
                <div class="logo-block">
                 <img src="images/logo-dark.svg" alt="logo" class="logo-main">
                </div>

            <form id="authGatewayForm" onsubmit="executePortalLogin(event)">
                
                <div class="input-control-group">
                    <label for="adminEmail">Account Administrator Email</label>
                    <input type="email" id="adminEmail" class="custom-input-element" placeholder="name@enterprise.com" required autocomplete="username">
                </div>

                <div class="input-control-group">
                    <label for="adminPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="adminPassword" class="custom-input-element" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility()">SHOW</button>
                    </div>
                </div>

                <div class="login-utilities-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberSession">
                        <span>Keep authenticated</span>
                    </label>
                    <a href="#forgot" class="portal-link" onclick="alert('Password resetting requires security coordinator master approval. Please check terminal root guides.')">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-auth-submit">
                     Authenticate
                </button>

                <div class="register-prompt-footer">
                    New instance array? <a href="onboard.html" class="portal-link">Initialize Client Workspace</a>
                </div>

            </form>

        </div>
    </main>

    <footer class="master-footer-sheet">
        &copy; 2026 APINexus Marketplace Core Infrastructure Engine. Layer-TLS Active.
    </footer>

    <script>
        function togglePasswordVisibility() {
            const passwordField = document.getElementById('adminPassword');
            const toggleButton = document.querySelector('.password-toggle-btn');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleButton.innerText = 'HIDE';
                toggleButton.style.color = 'var(--brand-primary)';
            } else {
                passwordField.type = 'password';
                toggleButton.innerText = 'SHOW';
                toggleButton.style.color = 'var(--text-secondary)';
            }
        }

        function executePortalLogin(event) {
            event.preventDefault();
            const email = document.getElementById('adminEmail').value;
            
            alert(`Access verification initialized for terminal: ${email}\nRedirecting securely to core dashboard array...`);
            window.location.href = "/dashboard"; 
        }
    </script>
</body>
</html>
